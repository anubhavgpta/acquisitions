name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    name: ESLint & Prettier Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier check
        id: prettier
        run: npm run format:check
        continue-on-error: true

      - name: Annotate ESLint failure
        if: steps.eslint.outcome == 'failure'
        run: |
          echo "::error title=ESLint failed::Linting issues were found. Run 'npm run lint:fix' locally to automatically fix them, then re-check any remaining issues manually."
          exit 1

      - name: Annotate Prettier failure
        if: steps.prettier.outcome == 'failure'
        run: |
          echo "::error title=Prettier check failed::Formatting issues were found. Run 'npm run format' locally to automatically format your code."
          exit 1
